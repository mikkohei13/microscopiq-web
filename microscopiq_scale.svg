<svg xmlns="http://www.w3.org/2000/svg"
     width="210mm"
     height="297mm"
     viewBox="0 0 210 297">

  <!-- 100 mm verification line -->
  <text x="55" y="20" font-family="sans-serif" font-size="4" fill="black">Verify correctly printed scale by measuring that this line is 100 mm.</text>
  <line x1="55" y1="25" x2="155" y2="25" stroke="black" stroke-width="0.15"/>
  <!-- end ticks for easier measuring -->
  <line x1="55" y1="23.5" x2="55" y2="26.5" stroke="black" stroke-width="0.15"/>
  <line x1="155" y1="23.5" x2="155" y2="26.5" stroke="black" stroke-width="0.15"/>

  <!-- Repeated scale-helper dot groups.
       Each group: two 0.70 mm dots 5 mm apart horizontally,
       plus one 0.33 mm dot 2.5 mm below the left dot. -->
  <defs>
    <g id="dots">
      <circle cx="0" cy="0" r="0.70" fill="black"/>
      <circle cx="5" cy="0" r="0.70" fill="black"/>
      <circle cx="0" cy="2.5" r="0.33" fill="black"/>
    </g>
  </defs>

  <!-- Grid: 5 columns x 8 rows, 35 mm column pitch, 30 mm row pitch -->
  <use href="#dots" x="25" y="50"/>
  <use href="#dots" x="60" y="50"/>
  <use href="#dots" x="95" y="50"/>
  <use href="#dots" x="130" y="50"/>
  <use href="#dots" x="165" y="50"/>

  <use href="#dots" x="25" y="80"/>
  <use href="#dots" x="60" y="80"/>
  <use href="#dots" x="95" y="80"/>
  <use href="#dots" x="130" y="80"/>
  <use href="#dots" x="165" y="80"/>

  <use href="#dots" x="25" y="110"/>
  <use href="#dots" x="60" y="110"/>
  <use href="#dots" x="95" y="110"/>
  <use href="#dots" x="130" y="110"/>
  <use href="#dots" x="165" y="110"/>

  <use href="#dots" x="25" y="140"/>
  <use href="#dots" x="60" y="140"/>
  <use href="#dots" x="95" y="140"/>
  <use href="#dots" x="130" y="140"/>
  <use href="#dots" x="165" y="140"/>

  <use href="#dots" x="25" y="170"/>
  <use href="#dots" x="60" y="170"/>
  <use href="#dots" x="95" y="170"/>
  <use href="#dots" x="130" y="170"/>
  <use href="#dots" x="165" y="170"/>

  <use href="#dots" x="25" y="200"/>
  <use href="#dots" x="60" y="200"/>
  <use href="#dots" x="95" y="200"/>
  <use href="#dots" x="130" y="200"/>
  <use href="#dots" x="165" y="200"/>

  <use href="#dots" x="25" y="230"/>
  <use href="#dots" x="60" y="230"/>
  <use href="#dots" x="95" y="230"/>
  <use href="#dots" x="130" y="230"/>
  <use href="#dots" x="165" y="230"/>

  <use href="#dots" x="25" y="260"/>
  <use href="#dots" x="60" y="260"/>
  <use href="#dots" x="95" y="260"/>
  <use href="#dots" x="130" y="260"/>
  <use href="#dots" x="165" y="260"/>
</svg>
