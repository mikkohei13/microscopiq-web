<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Microscopiq</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <div id="preview-area">
      <video id="preview" autoplay muted playsinline></video>
      <canvas id="overlay" aria-label="Calibration and measurement overlay"></canvas>
      <div id="camera-idle-layer" class="camera-idle-layer" role="region" aria-label="Camera">
        <div class="camera-idle-inner">
          <p id="camera-idle-headline" class="camera-idle-headline">Start the camera to begin.</p>
          <p id="camera-idle-detail" class="camera-idle-detail hidden"></p>
          <button type="button" id="btn-start-camera-center" class="camera-start-btn">
            Start camera
          </button>
        </div>
      </div>
      <div id="error-overlay" class="hidden" role="alert"></div>
      <div id="capture-flash" aria-hidden="true"></div>
    </div>

    <div id="control-bar">

      <div class="control-group">
        <div id="normal-capture-buttons" class="capture-button-row">
          <button type="button" id="btn-capture-measurements" class="hidden">Capture measurements</button>
          <button type="button" id="btn-capture-hi-res">Capture hi-res</button>
        </div>
        <button type="button" id="btn-cancel-burst" class="btn-cancel-burst hidden">
          Cancel burst
        </button>
      </div>

      <div class="control-group mode-row" role="group" aria-label="Capture mode">
        <label class="segmented">
          <input type="radio" name="capture-mode" value="normal" checked />
          <span>Single</span>
        </label>
        <label class="segmented">
          <input type="radio" name="capture-mode" value="burst" />
          <span>Burst</span>
        </label>
      </div>
      <div class="control-group burst-controls hidden" id="burst-controls">
        <label>Frames <input type="number" id="burst-count" min="1" max="30" value="5" /></label>
        <label>Interval (s) <input type="number" id="burst-interval" min="1" max="3" step="0.1" value="1" /></label>
      </div>
      <div class="control-group">
        <button type="button" id="btn-calibrate">Calibrate</button>
        <button type="button" id="btn-calibration-done" class="hidden">Calibration done</button>
        <button type="button" id="btn-calibration-cancel" class="hidden">Cancel calibration</button>
      </div>
      <div class="control-group">
        <span class="label">Measurements:</span>
        <button type="button" id="btn-toggle-measurement-mode" disabled>Switch to relative</button>
        <button type="button" id="btn-delete-measurement" disabled>Delete selected</button>
        <button type="button" id="btn-clear-measurements" disabled>Clear all</button>
      </div>
      <div class="control-group">
        <a class="help-link" href="help.html" target="_blank" rel="noopener noreferrer">Help</a>
      </div>
    </div>

    <!-- Hidden buttons for keyboard shortcuts (screen reader / focus) -->
    <div class="sr-only">
      <button type="button" id="kbd-capture-hi-res">Capture hi-res shortcut</button>
      <button type="button" id="kbd-capture-measurements">Capture measurements shortcut</button>
      <button type="button" id="kbd-cancel-burst">Cancel burst shortcut</button>
    </div>
  </div>

  <dialog id="calibration-dialog">
    <form id="calibration-form">
      <h2>Calibration</h2>
      <p>Enter the known distance (in millimeters) that you will align the line to.</p>
      <label>
        Distance (mm)
        <input
          type="number"
          id="calibration-mm"
          name="calibrationMm"
          min="1"
          max="100"
          step="1"
          inputmode="numeric"
          placeholder=""
          required
          autocomplete="off"
        />
      </label>
      <div class="dialog-actions">
        <button type="submit" value="start" id="calibration-start-btn">Start calibration</button>
        <button type="button" value="cancel" id="calibration-dialog-cancel">Cancel</button>
        <button type="button" id="btn-clear-calibration" disabled>Clear scale</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="js/app.js?v=7"></script>
</body>
</html>
